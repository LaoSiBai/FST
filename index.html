<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全屏时钟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.5s ease;
        }

        body.minimal {
            background: #000;
            color: rgba(255, 255, 255, 1);
        }

        body.default {
            color: #fff;
        }

        .clock {
            font-family: 'Space Mono', sans-serif;
            font-size: 8vw;
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1;
            z-index: 1;
            -webkit-background-clip: text;
            background-clip: text;
            text-align: center;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .clock-row {
            display: block;
        }

        .clock-colon {
            display: inline;
            padding: 0 0.05em;
        }

        .bottom-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 100;
        }

        .mode-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            outline: none;
            border-radius: 9999px;
            padding: 8px 24px;
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .mode-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .debug-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
        }

        .debug-panel label {
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            white-space: nowrap;
        }

        .debug-panel input[type="range"] {
            width: 200px;
            cursor: pointer;
        }

        .debug-panel .time-display {
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            min-width: 50px;
            text-align: center;
        }

        /* ========== 移动端适配 ========== */
        @media screen and (max-width: 768px) {
            .clock {
                font-size: 22vw;
                letter-spacing: 0.05em;
                line-height: 1.1;
                flex-direction: column;
                align-items: center;
            }

            .clock-row {
                display: block;
            }

            .clock-colon {
                display: none;
            }

            .mode-toggle {
                font-size: 14px;
                padding: 10px 22px;
            }

            .bottom-controls {
                bottom: 20px;
                gap: 12px;
            }

            .debug-panel {
                padding: 10px 16px;
            }

            .debug-panel label {
                font-size: 12px;
            }

            .debug-panel input[type="range"] {
                width: 150px;
            }
        }

        @media screen and (max-width: 414px) {
            .clock {
                font-size: 26vw;
            }
        }

        @media screen and (max-width: 375px) {
            .clock {
                font-size: 28vw;
            }
        }

        @media screen and (max-width: 320px) {
            .clock {
                font-size: 30vw;
            }
        }
    </style>
</head>
<body class="default">
    <div class="bottom-controls">
        <div class="debug-panel" id="debugPanel" style="display: none;">
            <label for="timeSlider">调试时间</label>
            <input type="range" id="timeSlider" min="0" max="1439" value="0">
            <span class="time-display" id="debugTime">00:00</span>
        </div>
        <button class="mode-toggle" id="modeToggle">切换模式</button>
    </div>
    <div class="clock" id="clock">
        <div class="clock-row" id="clockHours">00</div>
        <span class="clock-colon">:</span>
        <div class="clock-row" id="clockMinutes">00</div>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const clockHours = document.getElementById('clockHours');
        const clockMinutes = document.getElementById('clockMinutes');
        const timeSlider = document.getElementById('timeSlider');
        const debugTimeEl = document.getElementById('debugTime');
        const modeToggle = document.getElementById('modeToggle');
        const body = document.body;

        // 调试模式开关
        const DEBUG = true;

        // 模式: 'minimal' | 'default'
        let currentMode = 'default';

        // 一天中的关键时间点（小时）及其对应的渐变配置
        const timeStops = [
            {
                hour: 0,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [1, 2, 8] },
                    { pos: 40, color: [3, 5, 15] },
                    { pos: 70, color: [5, 8, 22] },
                    { pos: 100,color: [2, 4, 12] }
                ]
            },
            {
                hour: 3.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [2, 3, 10] },
                    { pos: 35, color: [4, 6, 18] },
                    { pos: 65, color: [6, 8, 25] },
                    { pos: 100,color: [3, 4, 14] }
                ]
            },
            {
                hour: 4.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [3, 4, 14] },
                    { pos: 30, color: [10, 9, 35] },
                    { pos: 55, color: [22, 18, 55] },
                    { pos: 85, color: [45, 38, 80] },
                    { pos: 100,color: [15, 13, 38] }
                ]
            },
            {
                hour: 5.25,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [10, 9, 35] },
                    { pos: 25, color: [30, 25, 65] },
                    { pos: 50, color: [70, 55, 95] },
                    { pos: 75, color: [120, 95, 100] },
                    { pos: 100,color: [50, 42, 85] }
                ]
            },
            {
                hour: 5.75,
                easing: 'easeInOutQuad',
                stops: [
                    { pos: 0,  color: [25, 22, 60] },
                    { pos: 25, color: [60, 50, 95] },
                    { pos: 50, color: [130, 105, 100] },
                    { pos: 75, color: [185, 150, 80] },
                    { pos: 100,color: [80, 70, 120] }
                ]
            },
            {
                hour: 7.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [70, 120, 190] },
                    { pos: 35, color: [120, 180, 225] },
                    { pos: 65, color: [185, 220, 195] },
                    { pos: 100,color: [95, 160, 210] }
                ]
            },
            {
                hour: 11,
                easing: 'easeInOutQuad',
                stops: [
                    { pos: 0,  color: [55, 165, 235] },
                    { pos: 45, color: [110, 200, 245] },
                    { pos: 75, color: [180, 230, 205] },
                    { pos: 100,color: [75, 180, 230] }
                ]
            },
            {
                hour: 14,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [65, 160, 230] },
                    { pos: 40, color: [130, 190, 220] },
                    { pos: 70, color: [195, 210, 165] },
                    { pos: 100,color: [95, 170, 215] }
                ]
            },
            {
                hour: 16.5,
                easing: 'easeInCubic',
                stops: [
                    { pos: 0,  color: [55, 145, 215] },
                    { pos: 35, color: [150, 175, 195] },
                    { pos: 65, color: [210, 185, 125] },
                    { pos: 100,color: [110, 145, 185] }
                ]
            },
            {
                hour: 18.5,
                easing: 'easeOutCubic',
                stops: [
                    { pos: 0,  color: [40, 85, 155] },
                    { pos: 30, color: [185, 125, 85] },
                    { pos: 55, color: [225, 155, 65] },
                    { pos: 80, color: [165, 105, 95] },
                    { pos: 100,color: [65, 60, 115] }
                ]
            },
            {
                hour: 20.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [20, 30, 75] },
                    { pos: 35, color: [85, 50, 90] },
                    { pos: 65, color: [50, 30, 80] },
                    { pos: 100,color: [18, 20, 50] }
                ]
            },
            {
                hour: 22.5,
                easing: 'easeInCubic',
                stops: [
                    { pos: 0,  color: [5, 7, 18] },
                    { pos: 40, color: [12, 15, 38] },
                    { pos: 70, color: [8, 10, 28] },
                    { pos: 100,color: [2, 4, 14] }
                ]
            }
        ];

        // 缓动曲线函数
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInCubic(t) {
            return t * t * t;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function lerpColor(c1, c2, t) {
            return [
                Math.round(lerp(c1[0], c2[0], t)),
                Math.round(lerp(c1[1], c2[1], t)),
                Math.round(lerp(c1[2], c2[2], t))
            ];
        }

        const easingMap = {
            easeInOutCubic,
            easeInOutQuad,
            easeOutCubic,
            easeInCubic
        };

        function getGradientConfig(totalMinutes) {
            const hour = totalMinutes / 60;

            let i = 0;
            for (; i < timeStops.length - 1; i++) {
                if (hour >= timeStops[i].hour && hour < timeStops[i + 1].hour) {
                    break;
                }
            }

            const start = timeStops[i];
            const end = timeStops[(i + 1) % timeStops.length];
            const duration = (end.hour > start.hour)
                ? (end.hour - start.hour)
                : (24 - start.hour + end.hour);
            const rawProgress = (hour - start.hour) / duration;

            const easingName = start.easing || 'easeInOutCubic';
            const easingFn = easingMap[easingName] || easeInOutCubic;
            const progress = easingFn(rawProgress);

            const maxStops = Math.max(start.stops.length, end.stops.length);
            const interpolatedStops = [];

            for (let s = 0; s < maxStops; s++) {
                const s1 = start.stops[Math.min(s, start.stops.length - 1)];
                const s2 = end.stops[Math.min(s, end.stops.length - 1)];

                interpolatedStops.push({
                    pos: lerp(s1.pos, s2.pos, progress),
                    color: lerpColor(s1.color, s2.color, progress)
                });
            }

            return interpolatedStops;
        }

        // 检测是否为移动设备
        function isMobile() {
            return window.innerWidth <= 768;
        }

        function generateGradient(stops) {
            const compressedStops = stops.map(s =>
                `rgb(${s.color[0]}, ${s.color[1]}, ${s.color[2]}) ${(s.pos * 0.8).toFixed(2)}%`
            ).join(', ');
            // 移动端圆心位于窗口上方可见区域，桌面端保持原位置
            const centerY = isMobile() ? '-20%' : '-60%';
            return `radial-gradient(circle 180vmax at 50% ${centerY}, ${compressedStops})`;
        }

        function getTextStyle(hour) {
            if (hour >= 20 && hour < 23) {
                const progress = (hour - 20) / 3;
                const glowIntensity = lerp(0.3, 0.8, progress);
                const glowSize = Math.round(lerp(20, 60, progress));
                return {
                    color: '#fff',
                    opacity: 1,
                    shadow: `0 0 ${glowSize}px rgba(255, 240, 200, ${glowIntensity.toFixed(2)}), 0 0 ${glowSize * 2}px rgba(255, 220, 150, ${(glowIntensity * 0.5).toFixed(2)})`
                };
            }

            return { color: '#fff', opacity: 0.6, shadow: 'none' };
        }

        function updateBackground(totalMinutes) {
            if (currentMode !== 'default') return;
            const stops = getGradientConfig(totalMinutes);
            body.style.background = generateGradient(stops);

            const hour = totalMinutes / 60;
            const textStyle = getTextStyle(hour);
            body.style.color = textStyle.color;
            clockEl.style.textShadow = textStyle.shadow;
            clockEl.style.opacity = textStyle.opacity;
            if (textStyle.fillGradient) {
                clockEl.style.backgroundImage = textStyle.fillGradient;
            } else {
                clockEl.style.backgroundImage = '';
            }
        }

        function updateClock() {
            let now;
            let totalMinutes;
            if (DEBUG && timeSlider) {
                totalMinutes = parseInt(timeSlider.value, 10);
                const h = Math.floor(totalMinutes / 60);
                const m = totalMinutes % 60;
                now = new Date();
                now.setHours(h, m, 0, 0);
                debugTimeEl.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            } else {
                now = new Date();
                totalMinutes = now.getHours() * 60 + now.getMinutes();
            }
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            clockHours.textContent = h;
            clockMinutes.textContent = m;
            updateBackground(totalMinutes);
        }

        // 模式切换
        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'minimal' ? 'default' : 'minimal';
            body.className = currentMode;
            if (currentMode === 'minimal') {
                body.style.background = '';
                body.style.color = '';
                clockEl.style.textShadow = '';
                clockEl.style.opacity = '1';
                clockEl.style.backgroundImage = '';
            } else {
                const now = new Date();
                const totalMinutes = DEBUG && timeSlider
                    ? parseInt(timeSlider.value, 10)
                    : now.getHours() * 60 + now.getMinutes();
                updateBackground(totalMinutes);
            }
        });

        // 窗口大小变化时重新计算背景（用于移动端/桌面端切换）
        window.addEventListener('resize', () => {
            if (currentMode === 'default') {
                const now = new Date();
                const totalMinutes = DEBUG && timeSlider
                    ? parseInt(timeSlider.value, 10)
                    : now.getHours() * 60 + now.getMinutes();
                updateBackground(totalMinutes);
            }
        });

        // 初始化滑杆为当前时间
        if (DEBUG && timeSlider) {
            const now = new Date();
            const currentTotalMinutes = now.getHours() * 60 + now.getMinutes();
            timeSlider.value = currentTotalMinutes;
        }

        // 每秒更新
        setInterval(updateClock, 1000);
        updateClock();

        // 滑杆拖动时实时更新
        if (DEBUG && timeSlider) {
            timeSlider.addEventListener('input', updateClock);
        }

        // 按 D 键切换调试面板
        document.addEventListener('keydown', (e) => {
            if (e.key === 'd' || e.key === 'D') {
                const panel = document.getElementById('debugPanel');
                if (panel) {
                    panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
                }
            }
        });
    </script>
</body>
</html>

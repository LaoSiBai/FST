<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Time DCDE</title>
    <link rel="icon" type="image/svg+xml" href="Group 34.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.5s ease;
        }

        body.minimal {
            background: #000;
            color: rgba(255, 255, 255, 1);
        }

        body.default {
            color: #fff;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            gap: 2vh;
        }

        /* ========== 励志语区域 ========== */
        .quote-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            text-align: center;
            min-height: 3.6em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote-text {
            position: absolute;
            width: 100%;
            left: 50%;
            top: 50%;
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(19.2px, 4.2vw, 38.4px);
            letter-spacing: 0.08em;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.75);
            opacity: 0;
            transition: opacity 1.2s ease, transform 1.2s ease;
            word-break: keep-all;
            transform: translate(-50%, calc(-50% + 10px));
        }

        .quote-text.active {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .quote-text.fade-out {
            opacity: 0;
            transform: translate(-50%, calc(-50% - 10px));
        }

        /* ========== 时钟区域 ========== */
        .clock {
            font-family: 'Space Mono', sans-serif;
            font-size: 9.6vw;
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1;
            z-index: 1;
            -webkit-background-clip: text;
            background-clip: text;
            text-align: center;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .clock-row {
            display: block;
        }

        .clock-colon {
            display: inline;
            padding: 0 0.05em;
        }

        /* ========== 时钟+倒计时行 ========== */
        .clock-row-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
        }

        /* ========== 考试倒计时区域 ========== */
        .countdown-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
        }

        .countdown-label {
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(12px, 1.2vw, 16.8px);
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.2em;
        }

        .countdown-timer {
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(26.4px, 4.2vw, 50.4px);
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1;
        }

        .countdown-timer .countdown-unit {
            display: inline-block;
            min-width: 1.6em;
            text-align: center;
        }

        .countdown-timer .countdown-tag {
            font-size: 0.5em;
            opacity: 0.5;
            vertical-align: baseline;
            margin-left: 0.1em;
        }

        .bottom-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 100;
        }

        .mode-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            outline: none;
            border-radius: 9999px;
            padding: 8px 24px;
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .mode-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .more-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .more-list {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            min-width: max-content;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .more-container.open .more-list {
            max-height: 150px;
            opacity: 1;
            bottom: 0; /* Cover the button itself or expand from it */
        }
        
        .more-container.open #moreBtn {
            opacity: 0;
            pointer-events: none;
        }

        .more-item {
            padding: 12px 24px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Space Mono', sans-serif;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s ease, background 0.3s ease;
            white-space: nowrap;
        }

        .more-item:hover, .more-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ========== 分贝仪 UI ========== */
        .decibel-container {
            gap: 4vh;
        }

        .decibel-main {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 1vw;
            font-family: 'Space Mono', sans-serif;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .decibel-value {
            font-size: clamp(80px, 15vw, 200px);
            font-weight: bold;
            line-height: 1;
        }

        .decibel-unit {
            font-size: clamp(24px, 4vw, 50px);
            opacity: 0.8;
        }

        .decibel-stats {
            display: flex;
            gap: 8vw;
            font-family: 'Space Mono', sans-serif;
            opacity: 0.7;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            font-size: clamp(12px, 1.5vw, 16px);
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-size: clamp(20px, 3vw, 32px);
            font-weight: bold;
        }

        .debug-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
        }

        .debug-panel label {
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            white-space: nowrap;
        }

        .debug-panel input[type="range"] {
            width: 200px;
            cursor: pointer;
        }

        .debug-panel .time-display {
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            min-width: 50px;
            text-align: center;
        }

        /* ========== 移动端适配 ========== */
        @media screen and (max-width: 768px) {
            .main-container {
                gap: 3vh;
            }

            .quote-container {
                width: 90vw;
            }

            .quote-text {
                font-size: clamp(19.2px, 6vw, 33.6px);
            }

            .clock-row-wrapper {
                gap: 3vw;
            }

            .countdown-timer {
                font-size: clamp(21.6px, 6vw, 38.4px);
            }

            .clock {
                font-size: 26.4vw;
                letter-spacing: 0.05em;
                line-height: 1.1;
                flex-direction: column;
                align-items: center;
            }

            .clock-row {
                display: block;
            }

            .clock-colon {
                display: none;
            }

            .countdown-label {
                font-size: clamp(10.8px, 2.6vw, 14.4px);
            }

            .mode-toggle {
                font-size: 14px;
                padding: 10px 22px;
            }

            .bottom-controls {
                bottom: 20px;
                gap: 12px;
            }

            .controls-row {
                gap: 8px;
            }

            .more-item {
                padding: 10px 20px;
                font-size: 14px;
            }

            .decibel-stats {
                gap: 12vw;
            }

            .debug-panel {
                padding: 10px 16px;
            }

            .debug-panel label {
                font-size: 12px;
            }

            .debug-panel input[type="range"] {
                width: 150px;
            }
        }

        @media screen and (max-width: 414px) {
            .clock {
                font-size: 31.2vw;
            }
        }

        @media screen and (max-width: 375px) {
            .clock {
                font-size: 33.6vw;
            }
        }

        @media screen and (max-width: 320px) {
            .clock {
                font-size: 36vw;
            }
        }
    </style>
</head>
<body class="default">

            <div class="stat-item">

        const moreItems = document.querySelectorAll('.more-item');
        const timeViewContainer = document.getElementById('timeViewContainer');
        const decibelViewContainer = document.getElementById('decibelViewContainer');
        const dbCurrent = document.getElementById('dbCurrent');
        const dbAvg = document.getElementById('dbAvg');
        const dbTime = document.getElementById('dbTime');
        const body = document.body;

        let debugMode = false;
        let clockInterval = null;
        let calibrationId = null;

        let currentMode = 'default';
        let currentView = 'time'; // 'time' or 'decibel'
        
        let audioContext = null;
        let mediaStreamSource = null;
        let analyser = null;
        let dbInterval = null;
        let dbMeasurements = [];

        // ========== 励志语数据 ==========

            "你所经历的每一次挫折，都是通往成功的必经之路"
        ];

        let currentQuoteIndex = -1;
        let activeQuoteSlot = 1;
        let lastQuoteTime = 0;
        const QUOTE_SWITCH_INTERVAL = 10 * 60 * 1000;

        const quoteText1 = document.getElementById('quoteText1');
        const quoteText2 = document.getElementById('quoteText2');

        function initQuote() {
            currentQuoteIndex = Math.floor(Math.random() * quotes.length);
            quoteText1.textContent = quotes[currentQuoteIndex];
            
            quoteText1.style.transition = 'none';
            quoteText1.classList.add('active');
            void quoteText1.offsetWidth;
            quoteText1.style.transition = '';
            
            activeQuoteSlot = 1;
            lastQuoteTime = Date.now();
        }

        function switchQuote() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * quotes.length);
            } while (newIndex === currentQuoteIndex && quotes.length > 1);
            
            currentQuoteIndex = newIndex;
            const nextText = quotes[currentQuoteIndex];

            const currentSlot = activeQuoteSlot === 1 ? quoteText1 : quoteText2;
            const nextSlot = activeQuoteSlot === 1 ? quoteText2 : quoteText1;

            currentSlot.classList.remove('active');
            currentSlot.classList.add('fade-out');

            nextSlot.style.transition = 'none';
            nextSlot.classList.remove('fade-out');
            nextSlot.classList.remove('active');
            nextSlot.textContent = nextText;

            void nextSlot.offsetWidth;

            nextSlot.style.transition = '';
            nextSlot.classList.add('active');

            activeQuoteSlot = activeQuoteSlot === 1 ? 2 : 1;
        }

        function checkQuoteRotation() {
            const now = Date.now();
            if (now - lastQuoteTime >= QUOTE_SWITCH_INTERVAL) {
                switchQuote();
                lastQuoteTime = now;
            }
        }

        const cdDays = document.getElementById('cdDays');

            const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const diff = EXAM_DATE - now;

            if (diff <= 0) {
                cdDays.textContent = '00';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            cdDays.textContent = String(days).padStart(2, '0');
        }

            {
                hour: 18.5,
                easing: 'easeOutCubic',
                stops: [
                    { pos: 0,  color: [40, 85, 155] },
                    { pos: 30, color: [185, 125, 85] },
                    { pos: 55, color: [225, 155, 65] },
                    { pos: 80, color: [165, 105, 95] },
                    { pos: 100,color: [65, 60, 115] }
                ]
            },
            {
                hour: 20.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [20, 30, 75] },
                    { pos: 35, color: [85, 50, 90] },
                    { pos: 65, color: [50, 30, 80] },
                    { pos: 100,color: [18, 20, 50] }
                ]
            },
            {
                hour: 22.5,
                easing: 'easeInCubic',
                stops: [
                    { pos: 0,  color: [5, 7, 18] },
                    { pos: 40, color: [12, 15, 38] },
                    { pos: 70, color: [8, 10, 28] },
                    { pos: 100,color: [2, 4, 14] }
                ]
            }
        ];

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInCubic(t) {
            return t * t * t;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function lerpColor(c1, c2, t) {
            return [
                Math.round(lerp(c1[0], c2[0], t)),
                Math.round(lerp(c1[1], c2[1], t)),
                Math.round(lerp(c1[2], c2[2], t))
            ];
        }

        const easingMap = {
            easeInOutCubic,
            easeInOutQuad,
            easeOutCubic,
            easeInCubic
        };

        function getShanghaiNow() {
            return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
        }

        function getShanghaiTotalMinutesPrecise() {
            const now = getShanghaiNow();
            return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60 + now.getMilliseconds() / 60000;
        }

        function getGradientConfig(totalMinutes) {
            const hour = totalMinutes / 60;

            let i = 0;
            for (; i < timeStops.length - 1; i++) {
                if (hour >= timeStops[i].hour && hour < timeStops[i + 1].hour) {
                    break;
                }
            }

            const start = timeStops[i];
            const end = timeStops[(i + 1) % timeStops.length];
            const duration = (end.hour > start.hour)
                ? (end.hour - start.hour)
                : (24 - start.hour + end.hour);
            const rawProgress = (hour - start.hour) / duration;

            const easingName = start.easing || 'easeInOutCubic';
            const easingFn = easingMap[easingName] || easeInOutCubic;
            const progress = easingFn(rawProgress);

            const maxStops = Math.max(start.stops.length, end.stops.length);
            const interpolatedStops = [];

            for (let s = 0; s < maxStops; s++) {
                const s1 = start.stops[Math.min(s, start.stops.length - 1)];
                const s2 = end.stops[Math.min(s, end.stops.length - 1)];

                interpolatedStops.push({
                    pos: lerp(s1.pos, s2.pos, progress),
                    color: lerpColor(s1.color, s2.color, progress)
                });
            }

            return interpolatedStops;
        }

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function generateGradient(stops) {
            const compressedStops = stops.map(s =>
                `rgb(${s.color[0]}, ${s.color[1]}, ${s.color[2]}) ${(s.pos * 0.8).toFixed(2)}%`
            ).join(', ');
            const centerY = isMobile() ? '-20%' : '-60%';
            return `radial-gradient(circle 180vmax at 50% ${centerY}, ${compressedStops})`;
        }

        function getTextStyle(hour) {
            if (hour >= 20 && hour < 23) {
                const progress = (hour - 20) / 3;
                const glowIntensity = lerp(0.3, 0.8, progress);
                const glowSize = Math.round(lerp(20, 60, progress));
                return {
                    color: '#fff',
                    opacity: 1,
                    shadow: `0 0 ${glowSize}px rgba(255, 240, 200, ${glowIntensity.toFixed(2)}), 0 0 ${glowSize * 2}px rgba(255, 220, 150, ${(glowIntensity * 0.5).toFixed(2)})`
                };
            }

            return { color: '#fff', opacity: 0.6, shadow: 'none' };
        }

        function updateBackground(totalMinutes) {
            if (currentMode !== 'default') return;
            const stops = getGradientConfig(totalMinutes);
            body.style.background = generateGradient(stops);

            const hour = totalMinutes / 60;
            const textStyle = getTextStyle(hour);
            body.style.color = textStyle.color;
            clockEl.style.textShadow = textStyle.shadow;
            clockEl.style.opacity = textStyle.opacity;
            if (textStyle.fillGradient) {
                clockEl.style.backgroundImage = textStyle.fillGradient;
            } else {
                clockEl.style.backgroundImage = '';
            }
        }

        function updateClock(totalMinutesOverride) {
            let totalMinutes;
            let displayH, displayM;

            if (totalMinutesOverride !== undefined) {
                totalMinutes = ((Math.floor(totalMinutesOverride) % 1440) + 1440) % 1440;
                displayH = Math.floor(totalMinutes / 60) % 24;
                displayM = totalMinutes % 60;
            } else if (debugMode) {
                totalMinutes = parseInt(timeSlider.value, 10);
                displayH = Math.floor(totalMinutes / 60);
                displayM = totalMinutes % 60;
                debugTimeEl.textContent = `${String(displayH).padStart(2, '0')}:${String(displayM).padStart(2, '0')}`;
            } else {
                const now = getShanghaiNow();
                totalMinutes = now.getHours() * 60 + now.getMinutes();
                displayH = now.getHours();
                displayM = now.getMinutes();
            }

            clockHours.textContent = String(displayH).padStart(2, '0');
            clockMinutes.textContent = String(displayM).padStart(2, '0');
            updateBackground(((Math.floor(totalMinutes) % 1440) + 1440) % 1440);
        }

        function startClock() {
            stopClock();
            clockInterval = setInterval(() => {
                updateClock();
                updateCountdown();
                checkQuoteRotation();
            }, 1000);
            updateClock();
            updateCountdown();
        }

        function stopClock() {
            if (clockInterval) {
                clearInterval(clockInterval);
                clockInterval = null;
            }
            if (calibrationId) {
                cancelAnimationFrame(calibrationId);
                calibrationId = null;
            }
        }

        function startCalibration(fromMinutes) {
            const targetMinutes = getShanghaiTotalMinutesPrecise();
            const diff = targetMinutes - fromMinutes;

            if (Math.abs(diff) < 1) {
                startClock();
                return;
            }

            const startMinutes = fromMinutes;
            const startTime = performance.now();
            const duration = 1500;

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);
                const currentTarget = getShanghaiTotalMinutesPrecise();
                const currentDiff = currentTarget - startMinutes;
                const currentMinutes = startMinutes + currentDiff * easedProgress;
                updateClock(currentMinutes);

                if (progress < 1) {
                    calibrationId = requestAnimationFrame(animate);
                } else {
                    calibrationId = null;
                    startClock();
                }
            }

            calibrationId = requestAnimationFrame(animate);
        }

        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'minimal' ? 'default' : 'minimal';
            body.className = currentMode;
            if (currentMode === 'minimal') {
                body.style.background = '';
                body.style.color = '';
                clockEl.style.textShadow = '';
                clockEl.style.opacity = '1';
                clockEl.style.backgroundImage = '';
            } else {
                updateClock();
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        moreBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            moreContainer.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (!moreContainer.contains(e.target)) {
                moreContainer.classList.remove('open');
            }
        });

        moreItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                moreItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentView = item.dataset.view;
                moreContainer.classList.remove('open');
                switchView(currentView);
            });
        });

        function switchView(view) {
            if (view === 'time') {
                timeViewContainer.style.display = 'flex';
                decibelViewContainer.style.display = 'none';
                stopDecibelMeter();
                updateClock();
            } else if (view === 'decibel') {
                timeViewContainer.style.display = 'none';
                decibelViewContainer.style.display = 'flex';
                startDecibelMeter();
                updateClock(); // update background
            }
        }

        async function startDecibelMeter() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                mediaStreamSource = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                mediaStreamSource.connect(analyser);

                const dataArray = new Float32Array(analyser.fftSize);
                dbMeasurements = [];
                dbStartTime = Date.now();
                dbCurrent.textContent = "0";
                dbAvg.textContent = "0 dB";
                dbTime.textContent = "00:00";

                dbInterval = setInterval(() => {
                    analyser.getFloatTimeDomainData(dataArray);
                    
                    let sum = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i] * dataArray[i];
                    }
                    let rms = Math.sqrt(sum / dataArray.length);
                    let db = 0;
                    if (rms > 0) {
                        // Math.log10(rms) is typically between -3 and 0 for RMS between 0.001 and 1
                        // 20 * log10(rms) will be -60 to 0 dBFS
                        // We map this to SPL (Sound Pressure Level) roughly by adding a constant (e.g. 100)
                        db = 20 * Math.log10(rms) + 100;
                        db = Math.max(0, Math.min(120, db));
                    }
                    
                    const dbValue = Math.round(db);
                    dbCurrent.textContent = dbValue;
                    
                    dbMeasurements.push(dbValue);
                    // Keep average stable over last 100 measurements (about 20 seconds)
                    if (dbMeasurements.length > 100) {
                        dbMeasurements.shift();
                    }
                    let avgSum = dbMeasurements.reduce((a, b) => a + b, 0);
                    dbAvg.textContent = Math.round(avgSum / dbMeasurements.length) + " dB";

                    const elapsedMs = Date.now() - dbStartTime;
                    const elapsedSec = Math.floor(elapsedMs / 1000);
                    const m = Math.floor(elapsedSec / 60).toString().padStart(2, '0');
                    const s = (elapsedSec % 60).toString().padStart(2, '0');
                    dbTime.textContent = `${m}:${s}`;
                    
                }, 200);
            } catch (err) {
                console.error("Microphone access denied or error:", err);
                dbCurrent.textContent = "--";
                dbAvg.textContent = "--";
                alert("无法访问麦克风，请检查浏览器权限设置。");
            }
        }

        function stopDecibelMeter() {
            if (dbInterval) {
                clearInterval(dbInterval);
                dbInterval = null;
            }
            if (mediaStreamSource) {
                mediaStreamSource.disconnect();
                const tracks = mediaStreamSource.mediaStream.getTracks();
                tracks.forEach(track => track.stop());
                mediaStreamSource = null;
            }
        }

        window.addEventListener('resize', () => {
            if (currentMode === 'default') {
                updateClock();
            }
        });

        timeSlider.addEventListener('input', () => {
            if (debugMode) updateClock();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'd' || e.key === 'D') {
                const panel = document.getElementById('debugPanel');
                if (!debugMode) {
                    debugMode = true;
                    stopClock();
                    panel.style.display = 'flex';
                    const now = getShanghaiNow();
                    timeSlider.value = now.getHours() * 60 + now.getMinutes();
                    updateClock();
                } else {
                    debugMode = false;
                    panel.style.display = 'none';
                    const fromMinutes = parseInt(timeSlider.value, 10);
                    startCalibration(fromMinutes);
                }
            }
        });

        initQuote();
        startClock();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Time DCDE</title>
    <link rel="icon" type="image/svg+xml" href="Group 34.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.5s ease;
        }

        body.minimal {
            background: #000;
            color: rgba(255, 255, 255, 1);
        }

        body.default {
            color: #fff;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            gap: 2vh;
        }

        /* ========== 励志语区域 ========== */
        .quote-container {
            position: relative;
            width: 80vw;
            max-width: 700px;
            min-height: 2.5em;
            text-align: center;
        }

        .quote-text {
            position: relative;
            width: 100%;
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(20px, 3.5vw, 36px);
            letter-spacing: 0.08em;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.75);
            opacity: 0;
            transition: opacity 1.2s ease, transform 1.2s ease;
            transform: translateY(10px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quote-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .quote-text.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }

        /* ========== 时钟区域 ========== */
        .clock {
            font-family: 'Space Mono', sans-serif;
            font-size: 8vw;
            font-weight: 400;
            letter-spacing: 0.05em;
            line-height: 1;
            z-index: 1;
            -webkit-background-clip: text;
            background-clip: text;
            text-align: center;
            white-space: nowrap;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .clock-row {
            display: block;
        }

        .clock-colon {
            display: inline;
            padding: 0 0.05em;
        }

        /* ========== 时钟+倒计时行 ========== */
        .clock-row-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
        }

        /* ========== 考试倒计时区域 ========== */
        .countdown-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            text-align: left;
        }

        .countdown-label {
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(10px, 1vw, 14px);
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.2em;
        }

        .countdown-timer {
            font-family: 'Space Mono', sans-serif;
            font-size: clamp(22px, 3.5vw, 42px);
            letter-spacing: 0.06em;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1;
        }

        .countdown-timer .countdown-unit {
            display: inline-block;
            min-width: 1.6em;
            text-align: center;
        }

        .countdown-timer .countdown-tag {
            font-size: 0.5em;
            opacity: 0.5;
            vertical-align: baseline;
            margin-left: 0.1em;
        }

        .bottom-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            z-index: 100;
        }

        .mode-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            outline: none;
            border-radius: 9999px;
            padding: 8px 24px;
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .mode-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .debug-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
        }

        .debug-panel label {
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            white-space: nowrap;
        }

        .debug-panel input[type="range"] {
            width: 200px;
            cursor: pointer;
        }

        .debug-panel .time-display {
            color: inherit;
            font-family: 'Space Mono', sans-serif;
            font-size: 14px;
            min-width: 50px;
            text-align: center;
        }

        /* ========== 移动端适配 ========== */
        @media screen and (max-width: 768px) {
            .main-container {
                gap: 3vh;
            }

            .quote-container {
                width: 90vw;
                min-height: 2.5em;
            }

            .quote-text {
                font-size: clamp(16px, 5vw, 28px);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .clock-row-wrapper {
                gap: 3vw;
            }

            .countdown-timer {
                font-size: clamp(18px, 5vw, 32px);
            }

            .clock {
                font-size: 22vw;
                letter-spacing: 0.05em;
                line-height: 1.1;
                flex-direction: column;
                align-items: center;
            }

            .clock-row {
                display: block;
            }

            .clock-colon {
                display: none;
            }

            .countdown-label {
                font-size: clamp(9px, 2.2vw, 12px);
            }

            .mode-toggle {
                font-size: 14px;
                padding: 10px 22px;
            }

            .bottom-controls {
                bottom: 20px;
                gap: 12px;
            }

            .debug-panel {
                padding: 10px 16px;
            }

            .debug-panel label {
                font-size: 12px;
            }

            .debug-panel input[type="range"] {
                width: 150px;
            }
        }

        @media screen and (max-width: 414px) {
            .clock {
                font-size: 26vw;
            }
        }

        @media screen and (max-width: 375px) {
            .clock {
                font-size: 28vw;
            }
        }

        @media screen and (max-width: 320px) {
            .clock {
                font-size: 30vw;
            }
        }
    </style>
</head>
<body class="default">
    <div class="bottom-controls">
        <div class="debug-panel" id="debugPanel" style="display: none;">
            <label for="timeSlider">调试时间</label>
            <input type="range" id="timeSlider" min="0" max="1439" value="0">
            <span class="time-display" id="debugTime">00:00</span>
        </div>
        <button class="mode-toggle" id="modeToggle">切换模式</button>
    </div>
    <div class="main-container">
        <div class="quote-container" id="quoteContainer">
            <div class="quote-text active" id="quoteText1"></div>
            <div class="quote-text" id="quoteText2"></div>
        </div>
        <div class="clock-row-wrapper">
            <div class="clock" id="clock">
                <div class="clock-row" id="clockHours">00</div>
                <span class="clock-colon">:</span>
                <div class="clock-row" id="clockMinutes">00</div>
            </div>
            <div class="countdown-container" id="countdownContainer">
                <div class="countdown-label">考试倒计时</div>
                <div class="countdown-timer" id="countdownTimer">
                    <span class="countdown-unit" id="cdDays">00</span><span class="countdown-tag">天</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const clockHours = document.getElementById('clockHours');
        const clockMinutes = document.getElementById('clockMinutes');
        const timeSlider = document.getElementById('timeSlider');
        const debugTimeEl = document.getElementById('debugTime');
        const modeToggle = document.getElementById('modeToggle');
        const body = document.body;

        let debugMode = false;
        let clockInterval = null;
        let calibrationId = null;

        let currentMode = 'default';

        // ========== 励志语数据 ==========
        const quotes = [
            "种一棵树最好的时间是十年前，其次是现在",
            "觉得晚了的时候，恰恰是最早的时候",
            "直面恐惧才能战胜恐惧。这次暴露的问题，都是高三提分的宝藏",
            "人生最痛苦的不是失败，而是'我本可以'",
            "乾坤未定，你我皆是黑马",
            "想，全是问题；做，才有答案",
            "你的对手只有你自己",
            "半山腰太挤了，我们山顶见",
            "同是寒窗苦读，怎愿甘拜下风？",
            "你要悄悄拔尖，然后惊艳所有人",
            "考好了是强心剂，考砸了是清醒剂，怎么算都不亏",
            "谁能在浮躁中沉下去，谁就赢了",
            "现在偷的懒，都是以后要吃的苦",
            "熬过无人问津的日子，才有诗和远方",
            "愿你在合上笔盖的那一刻，有着战士收刀入鞘的骄傲",
            "别假装努力，结果不会陪你演戏",
            "哪怕从这一刻开始，你也赢了刚才的自己",
            "总有第一名，为什么不能是你",
            "既然有机会，就去争一争",
            "不去想能不能赢，只去想今天弄懂了没",
            "干就完事了",
            "没有醒不来的早晨，没有熬不过的迷茫",
            "你背不下来的书，总有人能背下来",
            "你要记住，胜者为王",
            "现在刷题受的累，都是以后看世界的路",
            "凌晨六点的天很黑，但录取通知书上的名字很耀眼",
            "没有凭空而来的成绩，只有持之以恒的努力",
            "与其用泪水悔恨昨天，不如用汗水拼搏今天",
            "眉毛上的汗水和眉毛下的泪水，你必须选择一样",
            "尘埃落定前，请奋力一搏"
        ];

        let currentQuoteIndex = 0;
        let activeQuoteSlot = 1;
        let quoteInterval = null;
        const QUOTE_SWITCH_INTERVAL = 20 * 60 * 1000;

        const quoteText1 = document.getElementById('quoteText1');
        const quoteText2 = document.getElementById('quoteText2');

        function initQuote() {
            currentQuoteIndex = Math.floor(Math.random() * quotes.length);
            quoteText1.textContent = quotes[currentQuoteIndex];
            quoteText1.classList.add('active');
            activeQuoteSlot = 1;
        }

        function switchQuote() {
            currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
            const nextText = quotes[currentQuoteIndex];

            if (activeQuoteSlot === 1) {
                quoteText1.classList.remove('active');
                quoteText1.classList.add('fade-out');
                quoteText2.textContent = nextText;
                quoteText2.classList.add('active');
                setTimeout(() => {
                    quoteText1.classList.remove('fade-out');
                }, 1200);
                activeQuoteSlot = 2;
            } else {
                quoteText2.classList.remove('active');
                quoteText2.classList.add('fade-out');
                quoteText1.textContent = nextText;
                quoteText1.classList.add('active');
                setTimeout(() => {
                    quoteText2.classList.remove('fade-out');
                }, 1200);
                activeQuoteSlot = 1;
            }
        }

        function startQuoteRotation() {
            if (quoteInterval) clearInterval(quoteInterval);
            quoteInterval = setInterval(switchQuote, QUOTE_SWITCH_INTERVAL);
        }

        // ========== 考试倒计时 ==========
        const EXAM_DATE = new Date('2026-07-06T00:00:00+08:00');
        const cdDays = document.getElementById('cdDays');

        function updateCountdown() {
            const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
            const diff = EXAM_DATE - now;

            if (diff <= 0) {
                cdDays.textContent = '00';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            cdDays.textContent = String(days).padStart(2, '0');
        }

        // ========== 渐变背景配置 ==========
        const timeStops = [
            {
                hour: 0,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [1, 2, 8] },
                    { pos: 40, color: [3, 5, 15] },
                    { pos: 70, color: [5, 8, 22] },
                    { pos: 100,color: [2, 4, 12] }
                ]
            },
            {
                hour: 3.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [2, 3, 10] },
                    { pos: 35, color: [4, 6, 18] },
                    { pos: 65, color: [6, 8, 25] },
                    { pos: 100,color: [3, 4, 14] }
                ]
            },
            {
                hour: 4.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [3, 4, 14] },
                    { pos: 30, color: [10, 9, 35] },
                    { pos: 55, color: [22, 18, 55] },
                    { pos: 85, color: [45, 38, 80] },
                    { pos: 100,color: [15, 13, 38] }
                ]
            },
            {
                hour: 5.25,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [10, 9, 35] },
                    { pos: 25, color: [30, 25, 65] },
                    { pos: 50, color: [70, 55, 95] },
                    { pos: 75, color: [120, 95, 100] },
                    { pos: 100,color: [50, 42, 85] }
                ]
            },
            {
                hour: 5.75,
                easing: 'easeInOutQuad',
                stops: [
                    { pos: 0,  color: [25, 22, 60] },
                    { pos: 25, color: [60, 50, 95] },
                    { pos: 50, color: [130, 105, 100] },
                    { pos: 75, color: [185, 150, 80] },
                    { pos: 100,color: [80, 70, 120] }
                ]
            },
            {
                hour: 7.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [70, 120, 190] },
                    { pos: 35, color: [120, 180, 225] },
                    { pos: 65, color: [185, 220, 195] },
                    { pos: 100,color: [95, 160, 210] }
                ]
            },
            {
                hour: 11,
                easing: 'easeInOutQuad',
                stops: [
                    { pos: 0,  color: [55, 165, 235] },
                    { pos: 45, color: [110, 200, 245] },
                    { pos: 75, color: [180, 230, 205] },
                    { pos: 100,color: [75, 180, 230] }
                ]
            },
            {
                hour: 14,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [65, 160, 230] },
                    { pos: 40, color: [130, 190, 220] },
                    { pos: 70, color: [195, 210, 165] },
                    { pos: 100,color: [95, 170, 215] }
                ]
            },
            {
                hour: 16.5,
                easing: 'easeInCubic',
                stops: [
                    { pos: 0,  color: [55, 145, 215] },
                    { pos: 35, color: [150, 175, 195] },
                    { pos: 65, color: [210, 185, 125] },
                    { pos: 100,color: [110, 145, 185] }
                ]
            },
            {
                hour: 18.5,
                easing: 'easeOutCubic',
                stops: [
                    { pos: 0,  color: [40, 85, 155] },
                    { pos: 30, color: [185, 125, 85] },
                    { pos: 55, color: [225, 155, 65] },
                    { pos: 80, color: [165, 105, 95] },
                    { pos: 100,color: [65, 60, 115] }
                ]
            },
            {
                hour: 20.5,
                easing: 'easeInOutCubic',
                stops: [
                    { pos: 0,  color: [20, 30, 75] },
                    { pos: 35, color: [85, 50, 90] },
                    { pos: 65, color: [50, 30, 80] },
                    { pos: 100,color: [18, 20, 50] }
                ]
            },
            {
                hour: 22.5,
                easing: 'easeInCubic',
                stops: [
                    { pos: 0,  color: [5, 7, 18] },
                    { pos: 40, color: [12, 15, 38] },
                    { pos: 70, color: [8, 10, 28] },
                    { pos: 100,color: [2, 4, 14] }
                ]
            }
        ];

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInCubic(t) {
            return t * t * t;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function lerpColor(c1, c2, t) {
            return [
                Math.round(lerp(c1[0], c2[0], t)),
                Math.round(lerp(c1[1], c2[1], t)),
                Math.round(lerp(c1[2], c2[2], t))
            ];
        }

        const easingMap = {
            easeInOutCubic,
            easeInOutQuad,
            easeOutCubic,
            easeInCubic
        };

        function getShanghaiNow() {
            return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
        }

        function getShanghaiTotalMinutesPrecise() {
            const now = getShanghaiNow();
            return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60 + now.getMilliseconds() / 60000;
        }

        function getGradientConfig(totalMinutes) {
            const hour = totalMinutes / 60;

            let i = 0;
            for (; i < timeStops.length - 1; i++) {
                if (hour >= timeStops[i].hour && hour < timeStops[i + 1].hour) {
                    break;
                }
            }

            const start = timeStops[i];
            const end = timeStops[(i + 1) % timeStops.length];
            const duration = (end.hour > start.hour)
                ? (end.hour - start.hour)
                : (24 - start.hour + end.hour);
            const rawProgress = (hour - start.hour) / duration;

            const easingName = start.easing || 'easeInOutCubic';
            const easingFn = easingMap[easingName] || easeInOutCubic;
            const progress = easingFn(rawProgress);

            const maxStops = Math.max(start.stops.length, end.stops.length);
            const interpolatedStops = [];

            for (let s = 0; s < maxStops; s++) {
                const s1 = start.stops[Math.min(s, start.stops.length - 1)];
                const s2 = end.stops[Math.min(s, end.stops.length - 1)];

                interpolatedStops.push({
                    pos: lerp(s1.pos, s2.pos, progress),
                    color: lerpColor(s1.color, s2.color, progress)
                });
            }

            return interpolatedStops;
        }

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function generateGradient(stops) {
            const compressedStops = stops.map(s =>
                `rgb(${s.color[0]}, ${s.color[1]}, ${s.color[2]}) ${(s.pos * 0.8).toFixed(2)}%`
            ).join(', ');
            const centerY = isMobile() ? '-20%' : '-60%';
            return `radial-gradient(circle 180vmax at 50% ${centerY}, ${compressedStops})`;
        }

        function getTextStyle(hour) {
            if (hour >= 20 && hour < 23) {
                const progress = (hour - 20) / 3;
                const glowIntensity = lerp(0.3, 0.8, progress);
                const glowSize = Math.round(lerp(20, 60, progress));
                return {
                    color: '#fff',
                    opacity: 1,
                    shadow: `0 0 ${glowSize}px rgba(255, 240, 200, ${glowIntensity.toFixed(2)}), 0 0 ${glowSize * 2}px rgba(255, 220, 150, ${(glowIntensity * 0.5).toFixed(2)})`
                };
            }

            return { color: '#fff', opacity: 0.6, shadow: 'none' };
        }

        function updateBackground(totalMinutes) {
            if (currentMode !== 'default') return;
            const stops = getGradientConfig(totalMinutes);
            body.style.background = generateGradient(stops);

            const hour = totalMinutes / 60;
            const textStyle = getTextStyle(hour);
            body.style.color = textStyle.color;
            clockEl.style.textShadow = textStyle.shadow;
            clockEl.style.opacity = textStyle.opacity;
            if (textStyle.fillGradient) {
                clockEl.style.backgroundImage = textStyle.fillGradient;
            } else {
                clockEl.style.backgroundImage = '';
            }
        }

        function updateClock(totalMinutesOverride) {
            let totalMinutes;
            let displayH, displayM;

            if (totalMinutesOverride !== undefined) {
                totalMinutes = ((Math.floor(totalMinutesOverride) % 1440) + 1440) % 1440;
                displayH = Math.floor(totalMinutes / 60) % 24;
                displayM = totalMinutes % 60;
            } else if (debugMode) {
                totalMinutes = parseInt(timeSlider.value, 10);
                displayH = Math.floor(totalMinutes / 60);
                displayM = totalMinutes % 60;
                debugTimeEl.textContent = `${String(displayH).padStart(2, '0')}:${String(displayM).padStart(2, '0')}`;
            } else {
                const now = getShanghaiNow();
                totalMinutes = now.getHours() * 60 + now.getMinutes();
                displayH = now.getHours();
                displayM = now.getMinutes();
            }

            clockHours.textContent = String(displayH).padStart(2, '0');
            clockMinutes.textContent = String(displayM).padStart(2, '0');
            updateBackground(((Math.floor(totalMinutes) % 1440) + 1440) % 1440);
        }

        function startClock() {
            stopClock();
            clockInterval = setInterval(() => {
                updateClock();
                updateCountdown();
            }, 1000);
            updateClock();
            updateCountdown();
        }

        function stopClock() {
            if (clockInterval) {
                clearInterval(clockInterval);
                clockInterval = null;
            }
            if (calibrationId) {
                cancelAnimationFrame(calibrationId);
                calibrationId = null;
            }
        }

        function startCalibration(fromMinutes) {
            const targetMinutes = getShanghaiTotalMinutesPrecise();
            const diff = targetMinutes - fromMinutes;

            if (Math.abs(diff) < 1) {
                startClock();
                return;
            }

            const startMinutes = fromMinutes;
            const startTime = performance.now();
            const duration = 1500;

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);
                const currentTarget = getShanghaiTotalMinutesPrecise();
                const currentDiff = currentTarget - startMinutes;
                const currentMinutes = startMinutes + currentDiff * easedProgress;
                updateClock(currentMinutes);

                if (progress < 1) {
                    calibrationId = requestAnimationFrame(animate);
                } else {
                    calibrationId = null;
                    startClock();
                }
            }

            calibrationId = requestAnimationFrame(animate);
        }

        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'minimal' ? 'default' : 'minimal';
            body.className = currentMode;
            if (currentMode === 'minimal') {
                body.style.background = '';
                body.style.color = '';
                clockEl.style.textShadow = '';
                clockEl.style.opacity = '1';
                clockEl.style.backgroundImage = '';
            } else {
                updateClock();
            }
        });

        window.addEventListener('resize', () => {
            if (currentMode === 'default') {
                updateClock();
            }
        });

        timeSlider.addEventListener('input', () => {
            if (debugMode) updateClock();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'd' || e.key === 'D') {
                const panel = document.getElementById('debugPanel');
                if (!debugMode) {
                    debugMode = true;
                    stopClock();
                    panel.style.display = 'flex';
                    const now = getShanghaiNow();
                    timeSlider.value = now.getHours() * 60 + now.getMinutes();
                    updateClock();
                } else {
                    debugMode = false;
                    panel.style.display = 'none';
                    const fromMinutes = parseInt(timeSlider.value, 10);
                    startCalibration(fromMinutes);
                }
            }
        });

        initQuote();
        startQuoteRotation();
        startClock();
    </script>
</body>
</html>
